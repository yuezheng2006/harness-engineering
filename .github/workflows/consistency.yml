name: consistency

# Mirror the local pre-commit hook on the server side.
# Local hook only fires when contributors opt in via `git config core.hooksPath .githooks`,
# so this CI job is the actual quality gate before code lands on main.

on:
  push:
    branches: [main]
    paths:
      - 'references/articles.md'
      - 'references/AGENTS.md'
      - 'README.md'
      - 'README.en.md'
      - 'prompts/deep-research-tracker.md'
      - 'concepts/**.md'
      - 'thinking/**.md'
      - 'feedback/**.md'
      - 'scripts/check-consistency.sh'
      - '.github/workflows/consistency.yml'
  pull_request:
    paths:
      - 'references/articles.md'
      - 'references/AGENTS.md'
      - 'README.md'
      - 'README.en.md'
      - 'prompts/deep-research-tracker.md'
      - 'concepts/**.md'
      - 'thinking/**.md'
      - 'feedback/**.md'
      - 'scripts/check-consistency.sh'
      - '.github/workflows/consistency.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run consistency checks
        run: bash scripts/check-consistency.sh
